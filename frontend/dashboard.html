<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Pesquisa Ovos por Assinatura</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .header {
      background: #16213e;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }

    .header h1 {
      font-size: 1.4rem;
      color: #e94560;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ultima-atualizacao {
      font-size: 0.8rem;
      color: #888;
    }

    .btn-atualizar {
      padding: 8px 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-atualizar:hover { background: #c73450; }
    .btn-atualizar:disabled { background: #555; cursor: not-allowed; }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Cards de resumo */
    .cards-resumo {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 20px 24px;
      border: 1px solid #0f3460;
    }

    .card-label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .card-valor {
      font-size: 2.2rem;
      font-weight: 700;
      color: #e94560;
    }

    .card-sub {
      font-size: 0.82rem;
      color: #aaa;
      margin-top: 4px;
    }

    /* Grid de graficos */
    .graficos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }

    .grafico-box {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #0f3460;
    }

    .grafico-box h3 {
      font-size: 0.95rem;
      color: #ccc;
      margin-bottom: 16px;
    }

    .grafico-container {
      position: relative;
      width: 100%;
      max-height: 320px;
    }

    /* Tabela */
    .tabela-box {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #0f3460;
    }

    .tabela-box h3 {
      font-size: 0.95rem;
      color: #ccc;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: #888;
      text-transform: uppercase;
      border-bottom: 2px solid #0f3460;
    }

    td {
      padding: 10px 12px;
      font-size: 0.88rem;
      border-bottom: 1px solid #0f3460;
      color: #ccc;
    }

    tr:hover td { background: rgba(233, 69, 96, 0.05); }

    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 1.1rem;
    }

    .erro-msg {
      text-align: center;
      padding: 40px;
      color: #e94560;
    }

    @media (max-width: 900px) {
      .cards-resumo { grid-template-columns: repeat(2, 1fr); }
      .graficos-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .cards-resumo { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 12px; text-align: center; }
      .container { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dashboard - Pesquisa Ovos por Assinatura</h1>
    <div class="header-actions">
      <span class="ultima-atualizacao" id="ultima-atualizacao"></span>
      <button class="btn-atualizar" id="btn-atualizar" onclick="carregarDados()">Atualizar</button>
    </div>
  </div>

  <div class="container">
    <div id="conteudo">
      <div class="loading">Carregando dados...</div>
    </div>
  </div>

  <script>
    const CORES = [
      '#e94560', '#0f3460', '#533483', '#e9a045',
      '#45e980', '#4590e9', '#e945d4', '#45e9d4',
      '#e97045', '#7045e9'
    ];

    const CORES_ALPHA = CORES.map(c => c + 'cc');

    let chartInstances = [];

    function destruirGraficos() {
      chartInstances.forEach(c => c.destroy());
      chartInstances = [];
    }

    function contarValores(dados, campo) {
      const contagem = {};
      dados.forEach(d => {
        const val = d[campo];
        if (Array.isArray(val)) {
          val.forEach(v => { contagem[v] = (contagem[v] || 0) + 1; });
        } else if (val) {
          contagem[val] = (contagem[val] || 0) + 1;
        }
      });
      return contagem;
    }

    function maisVotado(contagem) {
      let max = 0, label = '-';
      for (const [k, v] of Object.entries(contagem)) {
        if (v > max) { max = v; label = k; }
      }
      return label;
    }

    function criarGrafico(canvasId, tipo, labels, valores, titulo) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      const isDoughnut = tipo === 'doughnut';
      const isHorizontal = tipo === 'horizontalBar';
      const chartType = isHorizontal ? 'bar' : tipo;

      const config = {
        type: chartType,
        data: {
          labels: labels,
          datasets: [{
            data: valores,
            backgroundColor: isDoughnut ? CORES.slice(0, labels.length) : CORES_ALPHA.slice(0, labels.length),
            borderColor: isDoughnut ? '#16213e' : CORES.slice(0, labels.length),
            borderWidth: isDoughnut ? 3 : 1,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: isHorizontal ? 'y' : 'x',
          plugins: {
            legend: { display: isDoughnut, position: 'bottom', labels: { color: '#aaa', padding: 12, font: { size: 11 } } },
            title: { display: false }
          },
          scales: isDoughnut ? {} : {
            x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#0f3460' } },
            y: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#0f3460' }, beginAtZero: true }
          }
        }
      };

      const chart = new Chart(ctx, config);
      chartInstances.push(chart);
    }

    function renderizarGrafico(contagem, canvasId, tipo) {
      const labels = Object.keys(contagem);
      const valores = Object.values(contagem);
      criarGrafico(canvasId, tipo, labels, valores);
    }

    function formatarData(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    async function carregarDados() {
      const btn = document.getElementById('btn-atualizar');
      btn.disabled = true;
      btn.textContent = 'Carregando...';

      try {
        const res = await fetch('https://formulario-ovo-production.up.railway.app/respostas');
        if (!res.ok) throw new Error('Erro ao buscar dados');
        const dados = await res.json();

        destruirGraficos();
        renderizar(dados);

        document.getElementById('ultima-atualizacao').textContent =
          'Atualizado em ' + new Date().toLocaleTimeString('pt-BR');
      } catch (err) {
        document.getElementById('conteudo').innerHTML =
          '<div class="erro-msg">Erro ao carregar dados: ' + err.message + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Atualizar';
      }
    }

    function renderizar(dados) {
      const total = dados.length;

      // Calcular metricas dos cards
      const interessados = dados.filter(d =>
        d.interesse_assinatura === 'Sim' || d.interesse_assinatura === 'Talvez'
      ).length;
      const pctInteresse = total > 0 ? Math.round((interessados / total) * 100) : 0;

      const contagemPreco = contarValores(dados, 'preco_duzia');
      const precoTop = maisVotado(contagemPreco);

      const contagemCanal = contarValores(dados, 'canal_comunicacao');
      const canalTop = maisVotado(contagemCanal);

      document.getElementById('conteudo').innerHTML = `
        <!-- Cards de resumo -->
        <div class="cards-resumo">
          <div class="card">
            <div class="card-label">Total de Respostas</div>
            <div class="card-valor">${total}</div>
          </div>
          <div class="card">
            <div class="card-label">Interesse em Assinatura</div>
            <div class="card-valor">${pctInteresse}%</div>
            <div class="card-sub">${interessados} de ${total} respondentes</div>
          </div>
          <div class="card">
            <div class="card-label">Faixa de Preco Mais Votada</div>
            <div class="card-valor" style="font-size:1.5rem">${precoTop}</div>
          </div>
          <div class="card">
            <div class="card-label">Canal Mais Votado</div>
            <div class="card-valor" style="font-size:1.5rem">${canalTop}</div>
          </div>
        </div>

        <!-- Graficos -->
        <div class="graficos-grid">
          <div class="grafico-box">
            <h3>Distribuicao por Faixa Etaria</h3>
            <div class="grafico-container"><canvas id="chart-etaria"></canvas></div>
          </div>
          <div class="grafico-box">
            <h3>Frequencia de Compra de Ovos</h3>
            <div class="grafico-container"><canvas id="chart-frequencia"></canvas></div>
          </div>
          <div class="grafico-box">
            <h3>Faixa de Preco Aceitavel por Duzia</h3>
            <div class="grafico-container"><canvas id="chart-preco"></canvas></div>
          </div>
          <div class="grafico-box">
            <h3>Interesse em Assinatura de Ovos</h3>
            <div class="grafico-container"><canvas id="chart-interesse"></canvas></div>
          </div>
          <div class="grafico-box">
            <h3>O Que Mais Importa ao Escolher Ovos</h3>
            <div class="grafico-container"><canvas id="chart-importancia"></canvas></div>
          </div>
          <div class="grafico-box">
            <h3>Onde Compra Atualmente</h3>
            <div class="grafico-container"><canvas id="chart-onde"></canvas></div>
          </div>
          <div class="grafico-box">
            <h3>Conceito de Marca Preferido</h3>
            <div class="grafico-container"><canvas id="chart-conceito"></canvas></div>
          </div>
          <div class="grafico-box">
            <h3>Canal de Comunicacao Preferido</h3>
            <div class="grafico-container"><canvas id="chart-canal"></canvas></div>
          </div>
        </div>

        <!-- Tabela -->
        <div class="tabela-box">
          <h3>Ultimas 20 Respostas</h3>
          <div style="overflow-x:auto">
            <table>
              <thead>
                <tr>
                  <th>Data/Hora</th>
                  <th>Cidade</th>
                  <th>Faixa Etaria</th>
                  <th>Interesse Assinatura</th>
                  <th>Quer Aviso</th>
                </tr>
              </thead>
              <tbody id="tabela-body"></tbody>
            </table>
          </div>
        </div>
      `;

      // Renderizar graficos
      renderizarGrafico(contarValores(dados, 'faixa_etaria'), 'chart-etaria', 'doughnut');
      renderizarGrafico(contarValores(dados, 'frequencia_compra'), 'chart-frequencia', 'bar');
      renderizarGrafico(contarValores(dados, 'preco_duzia'), 'chart-preco', 'bar');
      renderizarGrafico(contarValores(dados, 'interesse_assinatura'), 'chart-interesse', 'doughnut');
      renderizarGrafico(contarValores(dados, 'importancia'), 'chart-importancia', 'horizontalBar');
      renderizarGrafico(contarValores(dados, 'onde_compra'), 'chart-onde', 'bar');
      renderizarGrafico(contarValores(dados, 'conceito_marca'), 'chart-conceito', 'doughnut');
      renderizarGrafico(contarValores(dados, 'canal_comunicacao'), 'chart-canal', 'bar');

      // Preencher tabela (ultimas 20)
      const tbody = document.getElementById('tabela-body');
      const ultimas = dados.slice(0, 20);
      ultimas.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${formatarData(d.created_at)}</td>
          <td>${d.cidade || '-'}</td>
          <td>${d.faixa_etaria || '-'}</td>
          <td>${d.interesse_assinatura || '-'}</td>
          <td>${d.quer_aviso || '-'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Carregar ao abrir
    carregarDados();
  </script>
</body>
</html>
